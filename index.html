<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker - JS</title>
    <link rel="stylesheet" href="index.css" />
    <script type="text/javascript" src="script.js" defer></script>
</head>
<body>
    <header>
        <a href="/index.html">Cookie Clicker</a>
        <div>
            <a class="header-link" href="README.md">Documentation</a>
            <a class="header-link" href="https://simplonline-v3-prod.s3.eu-west-3.amazonaws.com/media/file/pdf/readme-fr-6a14a815bd13a750894239.pdf" target="_blank">Consignes</a>
            <a class="header-link" href="https://www.github.com/n4ssim-dev/cookie-clicker-simplon" target="_blank">Dépôt GitHub</a>
        </div>
    </header>

    <main>
        <div class="cookie-clicker">
            <h3 id="titre"></h3>
        <button id="click" class="btn-cookie">
            <svg class="cookie-svg" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="90" class="cookie-base"/>

                <!-- pépites -->
                <circle cx="60" cy="70" r="8" class="chip"/>
                <circle cx="120" cy="55" r="10" class="chip"/>
                <circle cx="145" cy="100" r="9" class="chip"/>
                <circle cx="80" cy="120" r="11" class="chip"/>
                <circle cx="125" cy="145" r="8" class="chip"/>
                <circle cx="55" cy="150" r="7" class="chip"/>
                <circle cx="95" cy="90" r="6" class="chip"/>
            </svg>
        </button>

            <div id="affichage">
                <div class="score">
                    <p>Nombre de cookies :</p>
                    <h3 id="cookie-score">0</h3>
                </div>

                <div class="multiplier">
                    <button id="multiplier">Multiplicateur : x1 (Coût: 50)</button>
                </div>

                <div class="autoclicker">
                    <button id="autoclic">Autoclicker (Coût : 500)</button>
                </div>

                <div class="bonus">
                    <button id="bonus">200% Bonus (Coût : 5000)</button>
                </div>
                
            </div>
        </div>
    </main>

    <footer>

    </footer>
</body>
</html>
